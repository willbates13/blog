{{ define "main" }}
<article class="post-article">
  <header class="post-header">
    <div class="post-date">{{ .Date.Format "January 2, 2006" }}</div>
    <h1>{{ .Title }}</h1>
    {{ with .Params.tags }}
    <div class="post-tags">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
    {{ end }}
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
